<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>远航 | KL Voyage</title>
  <style>
    :root {
      --paper: #f7f4ee;
      --ink: #151515;
      --muted: #68645d;
      --line: #d9d2c5;
      --card: #fffdf8;
      --accent: #5f574d;
      --red: #9f1239;
      --font-serif-cn: "Noto Serif CJK SC", "Source Han Serif SC", "Source Han Serif CN", "Songti SC", "STSong", SimSun, serif;
      --font-serif-latin: Georgia, "Times New Roman", serif;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-sans);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .cover {
      min-height: 72vh;
      display: grid;
      align-items: end;
      padding: 32px clamp(18px, 5vw, 72px);
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(110deg, rgba(104, 83, 61, .12), transparent 46%),
        linear-gradient(180deg, transparent 0, rgba(159, 18, 57, .08) 100%),
        #f3efe6;
    }

    .cover-inner,
    .archive {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    .brand-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 72px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .brand-row span:last-child {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: .1em;
      white-space: nowrap;
    }

    h1 {
      max-width: 1120px;
      margin: 0;
      font-family: var(--font-serif-cn);
      font-size: clamp(52px, 7vw, 96px);
      line-height: .96;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: normal;
      text-wrap: balance;
    }

    .title-lockup {
      display: flex;
      flex-wrap: wrap;
      gap: .08em .18em;
    }

    .title-lockup span {
      white-space: nowrap;
    }

    .title-cn-part {
      font-family: var(--font-serif-cn);
    }

    .latest {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--ink);
    }

    .latest p {
      margin: 0;
      max-width: 680px;
      font-size: clamp(17px, 2.2vw, 24px);
    }

    .enter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 18px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .enter:hover {
      background: #2a2622;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(21, 21, 21, .12);
    }

    .enter:active {
      transform: translateY(1px) scale(.99);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, .22);
    }

    .notice {
      padding: 14px clamp(18px, 5vw, 72px);
      color: #7f1d1d;
      background: #fffaf0;
      border-bottom: 1px solid var(--line);
    }

    .notice span {
      display: block;
      max-width: 1120px;
      margin: 0 auto;
      font-size: 14px;
    }

    main {
      padding: 46px clamp(18px, 5vw, 72px) 72px;
    }

    .archive-heading {
      margin-bottom: 18px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--ink);
    }

    .archive-eyebrow {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      font-family: var(--font-mono);
      text-transform: uppercase;
    }

    .archive h2 {
      margin: 0;
      font-family: var(--font-serif-cn);
      font-size: clamp(30px, 4vw, 48px);
      font-weight: 500;
      letter-spacing: 0;
    }

    .archive-grid {
      display: block;
    }

    .archive-card {
      display: grid;
      grid-template-columns: minmax(112px, .46fr) minmax(0, 1fr) minmax(132px, .36fr);
      gap: clamp(16px, 4vw, 44px);
      align-items: center;
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
      transition: background .16s ease, padding .16s ease, border-color .16s ease, transform .16s ease;
    }

    .archive-card:hover {
      margin-inline: -14px;
      padding-inline: 14px;
      background: rgba(255, 253, 248, .72);
      border-color: #c8bda9;
      transform: translateX(3px);
    }

    .archive-card:active {
      transform: translateX(3px) translateY(1px);
      background: rgba(243, 239, 230, .78);
    }

    .archive-date,
    .archive-card em,
    .archive-range,
    .archive-issue-label {
      color: var(--muted);
      font-style: normal;
    }

    .archive-date {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: .08em;
      white-space: nowrap;
    }

    .archive-title-lockup {
      display: flex;
      flex-wrap: wrap;
      gap: .06em .18em;
      color: var(--ink);
      font-family: var(--font-serif-cn);
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 500;
      line-height: 1.12;
    }

    .archive-title-lockup span {
      color: inherit;
      white-space: nowrap;
    }

    .archive-card em {
      display: block;
      margin-top: 8px;
      max-width: 720px;
      font-size: 14px;
      line-height: 1.55;
    }

    .archive-range {
      display: block;
      margin-top: 6px;
      font-size: 12px;
    }

    .archive-meta {
      display: grid;
      justify-items: end;
      gap: 8px;
      text-align: right;
    }

    .archive-issue-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
      font-family: var(--font-mono);
    }

    .archive-open {
      color: #3f3a33;
      font-family: var(--font-serif-latin);
      font-size: 15px;
      transition: color .16s ease, transform .16s ease;
      white-space: nowrap;
    }

    .archive-card:hover .archive-open {
      color: var(--ink);
      transform: translateX(3px);
    }

    @media (max-width: 720px) {
      .cover {
        min-height: 66vh;
      }

      .brand-row,
      .latest {
        grid-template-columns: 1fr;
        display: grid;
      }

      .brand-row {
        padding-bottom: 48px;
      }

      h1 {
        font-size: clamp(44px, 13vw, 56px);
      }

      .enter {
        width: 100%;
      }

      .archive-card {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .archive-card:hover {
        margin-inline: 0;
        padding-inline: 0;
      }

      .archive-meta {
        justify-items: start;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header class="cover">
    <div class="cover-inner">
      <div class="brand-row">
        <span>远航 | KL Voyage</span>
        <span>2026-W22 · 2026-05-28</span>
      </div>
      <h1 class="title-lockup"><span class="title-cn-part">远航 ·</span><span class="title-cn-part">客车产业周刊</span></h1>
      <div class="latest">
        <p>KL Voyage Bus Industry Weekly 2026-W22 Pilot Issue</p>
        <a class="enter" href="issues/voyage-2026-W22.html">阅读本期</a>
      </div>
    </div>
  </header>

  <div class="notice"><span>试刊样本，优先覆盖近两周，少量纳入本月代表性公开来源；不代表完整新闻覆盖。</span></div>

  <main>
    <section class="archive" aria-label="往期目录">
      <div class="archive-heading">
        <span class="archive-eyebrow">BACK ISSUES</span>
        <h2>往期目录</h2>
      </div>
      <div class="archive-grid">
        
        <a class="archive-card" href="issues/voyage-2026-W22.html">
          <time class="archive-date" datetime="2026-05-28">2026-05-28</time>
          <span class="archive-main">
            <strong class="archive-title-lockup"><span class="title-cn-part">远航 ·</span><span class="title-cn-part">客车产业周刊</span></strong>
            <em>KL Voyage Bus Industry Weekly 2026-W22 Pilot Issue</em>
            <span class="archive-range">2026-05-01 - 2026-05-27 · 9 items</span>
          </span>
          <span class="archive-meta">
            <span class="archive-issue-label">ISSUE 22</span>
            <span class="archive-open">打开本期 →</span>
          </span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
