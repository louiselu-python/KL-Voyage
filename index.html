<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>远航 | KL Voyage</title>
  <style>
    :root {
      --paper: #f7f4ee;
      --grid-line: rgba(132, 124, 112, .028);
      --ink: #151515;
      --muted: #68645d;
      --line: #d9d2c5;
      --card: #fffdf8;
      --accent: #5f574d;
      --red: #9f1239;
      --font-serif-cn: "Noto Serif CJK SC", "Source Han Serif SC", "Source Han Serif CN", "Songti SC", "STSong", SimSun, serif;
      --font-serif-latin: Georgia, "Times New Roman", serif;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
        linear-gradient(180deg, var(--grid-line) 1px, transparent 1px),
        var(--paper);
      background-size: 42px 42px;
      color: var(--ink);
      font-family: var(--font-sans);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .cover {
      min-height: 64vh;
      display: grid;
      align-items: end;
      padding: 32px clamp(18px, 5vw, 72px);
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(110deg, rgba(15, 118, 110, .14), transparent 46%),
        linear-gradient(180deg, transparent 0, rgba(159, 18, 57, .08) 100%),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
        linear-gradient(180deg, var(--grid-line) 1px, transparent 1px),
        #f3efe6;
      background-size: auto, auto, 42px 42px, 42px 42px, auto;
    }

    .cover-inner,
    .archive {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
    }

    .brand-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 56px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .brand-row span:last-child {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: .1em;
      white-space: nowrap;
    }

    h1 {
      max-width: 1120px;
      margin: 0;
      font-family: var(--font-serif-cn);
      font-size: clamp(42px, 5.6vw, 76px);
      line-height: 1.02;
      letter-spacing: 0;
      word-break: keep-all;
      overflow-wrap: normal;
      text-wrap: balance;
    }

    .title-lockup {
      display: flex;
      flex-wrap: wrap;
      gap: .08em .18em;
    }

    .title-lockup span {
      white-space: nowrap;
    }

    .title-cn-part {
      font-family: var(--font-serif-cn);
    }

    .latest {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .enter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 18px;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .enter:hover {
      background: #2a2622;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(21, 21, 21, .12);
    }

    .enter:active {
      transform: translateY(1px) scale(.99);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, .22);
    }

    .cover-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 28px;
    }

    .search-section {
      position: relative;
      width: 210px;
      max-width: 220px;
      margin-left: auto;
    }

    .search-input-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      height: 32px;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 248, .68);
      color: var(--ink);
      font: 12px/1.2 var(--font-sans);
      padding: 6px 34px 6px 13px;
      outline: none;
      transition: border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .search-input::placeholder {
      color: #8b857c;
    }

    .search-input:hover {
      border-color: #c5bbaa;
      background: rgba(255, 253, 248, .82);
    }

    .search-input:focus {
      border-color: #9f9485;
      background: #fffdf8;
      box-shadow: 0 0 0 3px rgba(104, 83, 61, .08);
    }

    .search-icon {
      position: absolute;
      top: 8px;
      right: 12px;
      width: 15px;
      height: 15px;
      color: var(--muted);
      opacity: .82;
      pointer-events: none;
    }

    .search-status {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 3;
      width: min(320px, calc(100vw - 36px));
      margin: 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .96);
      box-shadow: 0 16px 34px rgba(35, 31, 26, .10);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: left;
    }

    .search-status.is-visible {
      display: block;
    }

    .search-results {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 4;
      gap: 10px;
      width: min(340px, calc(100vw - 36px));
      max-height: min(520px, calc(100vh - 150px));
      overflow: auto;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .97);
      box-shadow: 0 18px 42px rgba(35, 31, 26, .12);
    }

    .search-results.is-visible {
      display: grid;
    }

    .search-result {
      display: grid;
      gap: 5px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .52);
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }

    .search-result:hover {
      background: rgba(255, 255, 255, .64);
      border-color: rgba(104, 83, 61, .24);
      transform: translateY(-1px);
    }

    .search-result:active {
      transform: translateY(.5px);
    }

    .search-result-meta,
    .search-result-source,
    .search-result-open {
      color: var(--muted);
      font-size: 12px;
    }

    .search-result-title {
      color: var(--ink);
      font-family: var(--font-serif-cn);
      font-size: 16px;
      line-height: 1.28;
    }

    .search-result-en,
    .search-result-snippet {
      margin: 0;
      color: #514d46;
      font-size: 13px;
      line-height: 1.65;
    }

    .search-result-open {
      justify-self: start;
      color: #5f574d;
      transition: color .16s ease, transform .16s ease;
    }

    .search-result:hover .search-result-open {
      color: var(--ink);
      transform: translateX(2px);
    }

    main {
      padding: 42px clamp(18px, 5vw, 72px) 72px;
    }

    .archive-heading {
      margin-bottom: 10px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--ink);
    }

    .archive-eyebrow {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: .16em;
      font-family: var(--font-mono);
      text-transform: uppercase;
    }

    .archive h2 {
      margin: 0;
      font-family: var(--font-serif-cn);
      font-size: clamp(30px, 3.7vw, 46px);
      font-weight: 500;
      line-height: .98;
      letter-spacing: 0;
    }

    .archive-grid {
      display: block;
    }

    .archive-card {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr) minmax(124px, auto);
      gap: clamp(18px, 3vw, 28px);
      align-items: center;
      padding: 22px 6px;
      border-bottom: 1px solid var(--line);
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .archive-card:hover {
      background: rgba(255, 255, 255, .35);
      border-color: rgba(104, 83, 61, .22);
      transform: translateX(3px);
    }

    .archive-card:active {
      transform: translateX(3px) translateY(.5px);
      background: rgba(243, 239, 230, .78);
    }

    .archive-date,
    .archive-card em,
    .archive-issue-label {
      color: var(--muted);
      font-style: normal;
    }

    .archive-date {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: .12em;
      white-space: nowrap;
    }

    .archive-title-lockup {
      display: flex;
      flex-wrap: wrap;
      gap: .06em .18em;
      color: var(--ink);
      font-family: var(--font-serif-cn);
      font-size: clamp(20px, 2.4vw, 28px);
      font-weight: 500;
      line-height: 1.08;
    }

    .archive-title-lockup span {
      color: inherit;
      white-space: nowrap;
    }

    .archive-week-label {
      color: #4f4a43;
    }

    .archive-card em {
      display: block;
      margin-top: 8px;
      max-width: 720px;
      font-size: 14px;
      line-height: 1.75;
    }

    .archive-meta {
      display: grid;
      justify-items: end;
      gap: 8px;
      text-align: right;
    }

    .archive-issue-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      font-family: var(--font-mono);
      color: #b33a2d;
    }

    .archive-open {
      color: var(--muted);
      font-family: var(--font-sans);
      font-size: 1rem;
      transition: color .16s ease, transform .16s ease;
      white-space: nowrap;
    }

    .archive-card:hover .archive-open {
      color: var(--ink);
      transform: translateX(3px);
    }

    @media (max-width: 720px) {
      .cover {
        min-height: 58vh;
      }

      .brand-row,
      .latest,
      .cover-actions {
        grid-template-columns: 1fr;
        display: grid;
        justify-items: end;
      }

      .brand-row {
        padding-bottom: 48px;
      }

      h1 {
        font-size: clamp(38px, 11vw, 50px);
      }

      .enter {
        width: auto;
      }

      .archive-card {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .search-section {
        width: min(220px, 70vw);
        max-width: min(220px, 70vw);
      }

      .archive-card:hover {
        transform: none;
      }

      .archive-meta {
        justify-items: start;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header class="cover">
    <div class="cover-inner">
      <div class="brand-row">
        <span>远航 | KL Voyage</span>
        <span>2026-W22 · 2026-05-28</span>
      </div>
      <div class="cover-actions">
        <section class="search-section" aria-label="搜索往期内容">
          <div class="search-input-wrap">
            <input
              class="search-input"
              id="history-search-input"
              type="search"
              autocomplete="off"
              aria-label="搜索往期内容"
              placeholder="搜索往期内容"
            >
            <svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="2"></circle>
              <path d="m16 16 4.2 4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            </svg>
            <p class="search-status" id="history-search-status"></p>
          </div>
          <div class="search-results" id="history-search-results" aria-live="polite"></div>
        </section>
      </div>
      <h1 class="title-lockup"><span class="title-cn-part">远航 ·</span><span class="title-cn-part">客车产业周刊</span></h1>
      <div class="latest">
        <a class="enter" href="issues/voyage-2026-W22.html">阅读最新一期</a>
      </div>
    </div>
  </header>

  <main>
    <section class="archive" aria-label="往期目录">
      <div class="archive-heading">
        <span class="archive-eyebrow">BACK ISSUES</span>
        <h2>往期目录</h2>
      </div>
      <div class="archive-grid">
        
        <a class="archive-card" href="issues/voyage-2026-W22.html">
          <time class="archive-date" datetime="2026-05-28">2026-05-28</time>
          <span class="archive-main">
            <strong class="archive-title-lockup"><span class="title-cn-part">远航 ·</span><span class="title-cn-part">客车产业周刊</span><span class="archive-week-label">· 第22周</span></strong>
            <em>KL Voyage Bus Industry Weekly · Week 22</em>
          </span>
          <span class="archive-meta">
            <span class="archive-issue-label">ISSUE 22</span>
            <span class="archive-open">打开本期 →</span>
          </span>
        </a>
      </div>
    </section>
  </main>
  <script>
    const searchInput = document.getElementById("history-search-input");
    const searchStatus = document.getElementById("history-search-status");
    const searchResults = document.getElementById("history-search-results");
    let searchIndex = [];
    let searchIndexReady = false;
    let firstSearchResultUrl = "";

    function normalizeSearchText(value) {
      return String(value || "").toLowerCase().trim();
    }

    function queryTokens(value) {
      return normalizeSearchText(value).split(/\s+/).filter(Boolean);
    }

    function clearSearchResults(message) {
      firstSearchResultUrl = "";
      searchResults.replaceChildren();
      searchResults.classList.remove("is-visible");
      setSearchStatus(message);
    }

    function setSearchStatus(message) {
      searchStatus.textContent = message || "";
      searchStatus.classList.toggle("is-visible", Boolean(message));
    }

    function buildSnippet(item, tokens) {
      const text = String(item.search_text || item.summary_cn || item.summary_en || "");
      const lower = text.toLowerCase();
      const firstHit = tokens.map((token) => lower.indexOf(token)).find((index) => index >= 0);
      if (firstHit === undefined) return text.slice(0, 96);
      const start = Math.max(0, firstHit - 34);
      const end = Math.min(text.length, firstHit + 82);
      return `${start > 0 ? "…" : ""}${text.slice(start, end)}${end < text.length ? "…" : ""}`;
    }

    function createResult(item, tokens) {
      const link = document.createElement("a");
      link.className = "search-result";
      link.href = item.article_url || item.issue_url || "#";

      const meta = document.createElement("span");
      meta.className = "search-result-meta";
      meta.textContent = [item.issue_number, item.publication_date].filter(Boolean).join(" · ");

      const title = document.createElement("strong");
      title.className = "search-result-title";
      title.textContent = item.title_cn || "未命名条目";

      const titleEn = document.createElement("p");
      titleEn.className = "search-result-en";
      titleEn.textContent = item.title_en || "";

      const source = document.createElement("span");
      source.className = "search-result-source";
      source.textContent = [item.source_name, (item.region_names_cn || item.region_tags || []).join(" · ")]
        .filter(Boolean)
        .join(" · ");

      const snippet = document.createElement("p");
      snippet.className = "search-result-snippet";
      snippet.textContent = buildSnippet(item, tokens);

      const open = document.createElement("span");
      open.className = "search-result-open";
      open.textContent = "打开文章 →";

      link.append(meta, title, titleEn, source, snippet, open);
      return link;
    }

    function runSearch() {
      const tokens = queryTokens(searchInput.value);
      if (tokens.join("").length < 2) {
        clearSearchResults("");
        return;
      }

      if (!searchIndexReady) {
        clearSearchResults("");
        return;
      }

      const matches = searchIndex
        .filter((item) => {
          const text = normalizeSearchText(item.search_text);
          return tokens.every((token) => text.includes(token));
        })
        .slice(0, 10);

      searchResults.replaceChildren();
      searchResults.classList.remove("is-visible");
      firstSearchResultUrl = matches[0]?.article_url || matches[0]?.issue_url || "";
      if (matches.length === 0) {
        setSearchStatus("暂无匹配内容。");
        return;
      }

      setSearchStatus("");
      searchResults.classList.add("is-visible");
      matches.forEach((item) => searchResults.append(createResult(item, tokens)));
    }

    if (searchInput && searchStatus && searchResults) {
      fetch("./search_index.json")
        .then((response) => {
          if (!response.ok) throw new Error("search index unavailable");
          return response.json();
        })
        .then((records) => {
          searchIndex = Array.isArray(records) ? records : [];
          searchIndexReady = true;
          runSearch();
        })
        .catch(() => {
          searchIndexReady = false;
          clearSearchResults("");
          console.warn("Search index unavailable.");
        });

      searchInput.addEventListener("input", runSearch);
      searchInput.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        event.preventDefault();
        if (firstSearchResultUrl) {
          window.location.href = firstSearchResultUrl;
        }
      });
    }
  </script>
</body>
</html>
